name: mascotia
description: "A new Flutter project."
publish_to: 'none' # Prevents accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Íconos estilo iOS
  cupertino_icons: ^1.0.8

  # Fuente elegante y moderna
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Buenas prácticas recomendadas
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 📂 Registro de assets (incluye todos los archivos en la carpeta)
  assets:
    - assets/images/

  # Ejemplo si quisieras fuentes locales en vez de Google Fonts
  # fonts:
